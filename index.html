function trainerToday(){const my=state.sessions.filter(s=>s.trainer==='Rahul Sharma'&&s.date===today);return shell(`${pageHead('Today','Your coaching day at a glance',`<button class="btn primary" onclick="navigate('schedule')">Open schedule</button>`)}<div class="grid kpis"><div class="card metric clickable" onclick="navigate('schedule')"><span>Sessions today</span><strong>${my.length}</strong></div><div class="card metric clickable" onclick="navigate('clients')"><span>Active clients</span><strong>${state.members.filter(m=>m.trainer==='Rahul Sharma'&&m.status==='Active').length}</strong></div><div class="card metric clickable" onclick="navigate('analysis')"><span>Reviews due</span><strong>3</strong></div><div class="card metric"><span>Performance score</span><strong>94</strong></div></div><div class="card" style="margin-top:16px"><h3>Today's sessions</h3>${my.map(s=>`<div class="attention-item"><div><strong>${s.time} · ${s.client}</strong><br><small>${s.status}</small></div><div><button class="btn sm success" onclick="sessionComplete(${s.id})">Complete</button> <button class="btn sm warn" onclick="sessionStatus(${s.id},'No-show')">No-show</button> <button class="btn sm" onclick="rescheduleSession(${s.id})">Reschedule</button> <button class="btn sm danger" onclick="cancelSession(${s.id})">Cancel</button></div></div>`).join('')||`<div class="empty"><h3>No sessions left today</h3><button class="btn primary" onclick="navigate('schedule')">Book a session</button></div>`}</div><div class="actions" style="margin-top:16px"><button class="btn" onclick="navigate('workout')">Build workout</button><button class="btn" onclick="navigate('diet')">Build diet chart</button><button class="btn" onclick="navigate('reminders')">Send reminder</button><button class="btn" onclick="applyLeave('Rahul Sharma')">Apply leave</button></div>`)}
function sessionComplete(id){const s=state.sessions.find(x=>x.id===id);modal('Complete session',`<div class="field"><label>Session notes</label><textarea id="sessionNotes"></textarea></div>`,`<button class="btn" data-close>Cancel</button><button class="btn success" id="completeBtn">Mark complete</button>`);$('#completeBtn').onclick=()=>{s.status='Completed';s.notes=$('#sessionNotes').value;closeModal();render();toast(`Session with ${s.client} completed`)}}
function sessionStatus(id,status){const s=state.sessions.find(x=>x.id===id);confirmDialog(`Mark ${status}`,`Mark ${s.client}'s session as ${status}?`,`Mark ${status}`,()=>{s.status=status;render();toast(`${s.client} marked ${status}`)})}
function rescheduleSession(id){const s=state.sessions.find(x=>x.id===id);bookingForm(s.date,s.time,id)}
function cancelSession(id){const s=state.sessions.find(x=>x.id===id);modal('Cancel session',`<div class="field"><label>Reason</label><textarea id="cancelReason"></textarea><div class="error-text"></div></div>`,`<button class="btn" data-close>Keep session</button><button class="btn danger" id="cancelSessionBtn">Cancel session</button>`);$('#cancelSessionBtn').onclick=()=>{if(!$('#cancelReason').value.trim()){toast('Cancellation reason is required','error');return}s.status='Cancelled';s.reason=$('#cancelReason').value;closeModal();render();toast(`Session with ${s.client} cancelled`)}}
function trainerClients(){const clients=state.members.filter(m=>m.trainer==='Rahul Sharma');return shell(`${pageHead('My Clients','Progress, plans and weekly coaching workspace')}<div class="grid three">${clients.map(m=>{const ms=m.measurements,change=(ms.at(-1).weight-ms[0].weight).toFixed(1);return `<div class="card clickable" onclick="state.selectedMember=${m.id};navigate('trainerClient')"><div class="avatar">${m.name.split(' ').map(x=>x[0]).join('')}</div><h3>${m.name}</h3><p>${m.goal}</p><p>Current ${ms.at(-1).weight} kg · Change ${change} kg</p></div>`}).join('')}</div>`)}
function trainerClient(){const m=state.members.find(x=>x.id===state.selectedMember);const tabs=['stats','workout','diet','sessions','analysis'];let b='';if(state.trainerClientTab==='stats')b=`<div class="card"><h3>Body statistics</h3><div class="chart">${lineChart(m.measurements)}</div><button class="btn primary" onclick="trainerMeasurement(${m.id})">Record new measurement</button></div>`;if(state.trainerClientTab==='workout')b=`<div class="card">${state.workoutPlan.map(d=>`<h3>${d.day}</h3>${d.exercises.map(e=>`<p>${e.name} — ${e.sets} × ${e.reps} at ${e.weight}</p>`).join('')}`).join('')}</div>`;if(state.trainerClientTab==='diet')b=`<div class="card">${state.dietMeals.map(x=>`<h3>${x.name}</h3>${x.items.map(i=>`<p>${i.food} · ${i.qty} · ${i.cal} kcal</p>`).join('')}`).join('')}</div>`;if(state.trainerClientTab==='sessions')b=`<div class="card">${state.sessions.filter(s=>s.client===m.name).map(s=>`<div class="attention-item"><span>${s.date} ${s.time}</span><span class="badge ${s.status.toLowerCase()}">${s.status}</span></div>`).join('')||'<div class="empty">No session history.</div>'}</div>`;if(state.trainerClientTab==='analysis')b=`<div class="grid two">${m.analyses.map(a=>`<div class="card"><h3>${a.week}</h3><b>${a.adherence}% adherence</b><p>${a.note}</p></div>`).join('')}</div>`;return shell(`${pageHead(m.name,`${m.goal} · ${m.status}`,`<button class="btn" onclick="navigate('clients')">Back</button>`)}<div class="tabs">${tabs.map(t=>`<button class="tab ${state.trainerClientTab===t?'active':''}" onclick="state.trainerClientTab='${t}';render()">${t}</button>`).join('')}</div>${b}`)}
function trainerMeasurement(id){const fields=['height','weight','body fat','chest','waist','hips','resting heart rate','blood pressure','stress level','sleep hours','existing conditions','medications','injuries'];modal('Record full measurement',`<div class="form-grid">${fields.map(f=>`<div class="field"><label>${f}</label><input data-measure="${f}" ${f==='existing conditions'||f==='medications'||f==='injuries'?'':'type="text"'}></div>`).join('')}</div>`,`<button class="btn" data-close>Cancel</button><button class="btn primary" id="saveMeasure">Save measurement</button>`);$('#saveMeasure').onclick=()=>{const m=state.members.find(x=>x.id===id),w=+$('[data-measure="weight"]').value,f=+$('[data-measure="body fat"]').value;if(!w||!f){toast('Weight and body fat are required','error');return}m.measurements.push({date:today,weight:w,fat:f,waist:+$('[data-measure="waist"]').value||0});closeModal();render();toast(`Measurement saved for ${m.name}`)}}
function trainerSchedule(){const dates=['2026-07-20','2026-07-21','2026-07-22','2026-07-23','2026-07-24','2026-07-25','2026-07-26'],hours=[7,9,11,13,15,17,19];return shell(`${pageHead('Weekly Schedule','Book, edit and manage training sessions',`<button class="btn" onclick="availabilityForm()">Availability</button>`)}<div class="hint">Click an empty slot to book. Click a booked session to edit it. Double-booking is blocked.</div><div class="calendar"><div class="cal-cell cal-head">Time</div>${dates.map(d=>`<div class="cal-cell cal-head">${d.slice(5)}</div>`).join('')}${hours.map(h=>`<div class="cal-cell cal-head">${h}:00</div>${dates.map(d=>{const s=state.sessions.find(x=>x.trainer==='Rahul Sharma'&&x.date===d&&x.time===String(h).padStart(2,'0')+':00'&&x.status!=='Cancelled');return `<div class="cal-cell">${s?`<button class="slot" onclick="bookingForm('${d}','${s.time}',${s.id})"><div class="booking">${s.client}<br>${s.status}</div></button>`:`<button class="slot" aria-label="Book ${d} ${h}:00" onclick="bookingForm('${d}','${String(h).padStart(2,'0')}:00')">+</button>`}</div>`}).join('')}`).join('')}</div>`)}
function bookingForm(date,time,id){const s=id?state.sessions.find(x=>x.id===id):{};modal(id?'Edit session':'Book session',`<div class="form-grid"><div class="field"><label>Client</label><select id="bookClient">${state.members.filter(m=>m.trainer==='Rahul Sharma').map(m=>`<option ${s.client===m.name?'selected':''}>${m.name}</option>`).join('')}</select></div><div class="field"><label>Date</label><input id="bookDate" type="date" value="${date}"></div><div class="field"><label>Time</label><input id="bookTime" type="time" value="${time}"></div></div>${id?`<div class="actions" style="margin-top:12px"><button class="btn success" onclick="sessionComplete(${id})">Complete</button><button class="btn danger" onclick="cancelSession(${id})">Cancel</button></div>`:''}`,`<button class="btn" data-close>Close</button><button class="btn primary" id="saveBooking">${id?'Save changes':'Book session'}</button>`);$('#saveBooking').onclick=()=>{const d=$('#bookDate').value,t=$('#bookTime').value;const clash=state.sessions.find(x=>x.trainer==='Rahul Sharma'&&x.date===d&&x.time===t&&x.status!=='Cancelled'&&x.id!==id);if(clash){toast(`Double-booking blocked: ${clash.client} already has this slot`,'error');return}if(id)Object.assign(s,{client:$('#bookClient').value,date:d,time:t});else state.sessions.push({id:Date.now(),date:d,time:t,client:$('#bookClient').value,trainer:'Rahul Sharma',status:'Booked'});closeModal();render();toast(`Session ${id?'rescheduled':'booked'} for ${$('#bookClient')?.value||s.client}`)}}
function availabilityForm(){modal('Set availability',`<div class="form-grid"><div class="field"><label>Start hour</label><input id="avStart" type="number" min="5" max="22" value="${state.availability.start}"></div><div class="field"><label>End hour</label><input id="avEnd" type="number" min="5" max="23" value="${state.availability.end}"></div></div>`,`<button class="btn" data-close>Cancel</button><button class="btn primary" id="saveAvail">Save availability</button>`);$('#saveAvail').onclick=()=>{state.availability={start:+$('#avStart').value,end:+$('#avEnd').value};closeModal();toast('Trainer availability saved')}}
function workoutBuilder(){return shell(`${pageHead('Workout Plan Builder','Build, duplicate, assign and preview plans',`<button class="btn" onclick="copyWorkout()">Copy existing</button><button class="btn" onclick="saveWorkoutTemplate()">Save template</button><button class="btn primary" onclick="assignWorkout()">Assign</button>`)}<div class="hint">Edit any field directly. Add, duplicate or delete exercise rows.</div><div id="workoutDays">${state.workoutPlan.map((d,di)=>`<div class="card" style="margin-bottom:14px"><div class="page-head"><h3 contenteditable="true" oninput="state.workoutPlan[${di}].day=this.textContent;setDirty()">${d.day}</h3><button class="btn sm" onclick="addExercise(${di})">Add exercise</button></div>${d.exercises.map((e,ei)=>workoutRow(di,ei,e)).join('')}</div>`).join('')}</div><div class="actions"><button class="btn" onclick="addWorkoutDay()">Add day</button><button class="btn" onclick="previewWorkout()">Preview member view</button><button class="btn primary" onclick="state.dirty=false;toast('Workout plan saved')">Save plan</button></div>`)}
function workoutRow(di,ei,e){return `<div class="builder-row"><input value="${e.name}" onchange="state.workoutPlan[${di}].exercises[${ei}].name=this.value;setDirty()"><input value="${e.sets}" onchange="state.workoutPlan[${di}].exercises[${ei}].sets=+this.value;setDirty()"><input value="${e.reps}" onchange="state.workoutPlan[${di}].exercises[${ei}].reps=+this.value;setDirty()"><input value="${e.weight}" onchange="state.workoutPlan[${di}].exercises[${ei}].weight=this.value;setDirty()"><input value="${e.rest}" onchange="state.workoutPlan[${di}].exercises[${ei}].rest=this.value;setDirty()"><input value="${e.notes}" onchange="state.workoutPlan[${di}].exercises[${ei}].notes=this.value;setDirty()"><div><button class="btn sm" onclick="duplicateExercise(${di},${ei})">Copy</button><button class="btn sm danger" onclick="deleteExercise(${di},${ei})">×</button></div></div>`}
function addExercise(di){state.workoutPlan[di].exercises.push({name:'New exercise',sets:3,reps:12,weight:'Bodyweight',rest:'60 sec',notes:''});render();toast('Exercise added')}
function duplicateExercise(di,ei){state.workoutPlan[di].exercises.splice(ei+1,0,{...state.workoutPlan[di].exercises[ei]});render();toast('Exercise duplicated')}
function deleteExercise(di,ei){confirmDialog('Delete exercise','Remove this exercise row?','Delete exercise',()=>{state.workoutPlan[di].exercises.splice(ei,1);render();toast('Exercise deleted')})}
function addWorkoutDay(){state.workoutPlan.push({day:'New training day',exercises:[]});render();toast('Workout day added')}
function copyWorkout(){state.workoutPlan=JSON.parse(JSON.stringify(state.workoutPlan));state.workoutPlan.push({day:'Copied Conditioning Day',exercises:[{name:'Battle ropes',sets:6,reps:30,weight:'—',rest:'30 sec',notes:'Seconds per set'}]});render();toast('Existing plan copied')}
function saveWorkoutTemplate(){toast('Workout saved as reusable template')}
function assignWorkout(){modal('Assign workout plan',`<div class="field"><label>Clients</label><select id="assignClients" multiple size="6">${state.members.filter(m=>m.trainer==='Rahul Sharma').map(m=>`<option>${m.name}</option>`).join('')}</select></div><div class="field"><label>Start date</label><input id="workStart" type="date" value="${today}"></div>`,`<button class="btn" data-close>Cancel</button><button class="btn primary" id="assignWorkBtn">Assign plan</button>`);$('#assignWorkBtn').onclick=()=>{const n=[...$('#assignClients').selectedOptions].length;if(!n){toast('Select at least one client','error');return}closeModal();toast(`Workout assigned to ${n} client(s)`)}}
function previewWorkout(){modal('Member workout preview',state.workoutPlan.map(d=>`<h3>${d.day}</h3>${d.exercises.map(e=>`<div class="exercise"><span>□</span><span>${e.name}<br><small>${e.sets} sets × ${e.reps}</small></span><b>${e.weight}</b></div>`).join('')}`).join(''))}
function dietBuilder(){const totals=dietTotals();return shell(`${pageHead('Diet Chart Builder','Calories and macros recalculate live',`<button class="btn" onclick="addMeal()">Add meal</button><button class="btn primary" onclick="assignDiet()">Assign</button>`)}<div class="macro"><div><b>Calories</b><h3>${totals.cal}/2000</h3></div><div><b>Protein</b><h3>${totals.p}g · ${totals.pm}%</h3></div><div><b>Carbs</b><h3>${totals.c}g · ${totals.cm}%</h3></div><div><b>Fat</b><h3>${totals.f}g · ${totals.fm}%</h3></div></div>${state.dietMeals.map((m,mi)=>`<div class="card" style="margin-top:14px"><div class="page-head"><h3>${m.name}</h3><div><button class="btn sm" onclick="duplicateMeal(${mi})">Duplicate</button> <button class="btn sm" onclick="addDietItem(${mi})">Add item</button> <button class="btn sm danger" onclick="deleteMeal(${mi})">Delete</button></div></div>${m.items.map((i,ii)=>`<div class="builder-row" style="grid-template-columns:1.5fr 1fr .7fr .7fr .7fr .7fr auto"><input value="${i.food}" onchange="state.dietMeals[${mi}].items[${ii}].food=this.value;render()"><input value="${i.qty}" onchange="state.dietMeals[${mi}].items[${ii}].qty=this.value"><input type="number" value="${i.cal}" onchange="state.dietMeals[${mi}].items[${ii}].cal=+this.value;render()"><input type="number" value="${i.p}" onchange="state.dietMeals[${mi}].items[${ii}].p=+this.value;render()"><input type="number" value="${i.c}" onchange="state.dietMeals[${mi}].items[${ii}].c=+this.value;render()"><input type="number" value="${i.f}" onchange="state.dietMeals[${mi}].items[${ii}].f=+this.value;render()"><button class="btn sm danger" onclick="deleteDietItem(${mi},${ii})">×</button></div>`).join('')}</div>`).join('')}<div class="actions" style="margin-top:14px"><button class="btn" onclick="previewDiet()">Preview</button><button class="btn primary" onclick="toast('Diet chart saved')">Save chart</button></div>`)}
function dietTotals(){const x=state.dietMeals.flatMap(m=>m.items).reduce((a,i)=>({cal:a.cal+i.cal,p:a.p+i.p,c:a.c+i.c,f:a.f+i.f}),{cal:0,p:0,c:0,f:0}),k=x.p*4+x.c*4+x.f*9||1;return {...x,pm:Math.round(x.p*4/k*100),cm:Math.round(x.c*4/k*100),fm:Math.round(x.f*9/k*100)}}
function addMeal(){state.dietMeals.push({name:'New meal',items:[]});render();toast('Meal added')}function duplicateMeal(i){state.dietMeals.splice(i+1,0,JSON.parse(JSON.stringify(state.dietMeals[i])));render();toast('Meal duplicated')}function addDietItem(i){state.dietMeals[i].items.push({food:'New food',qty:'1 serving',cal:100,p:5,c:15,f:2});render();toast('Food item added')}function deleteDietItem(i,j){state.dietMeals[i].items.splice(j,1);render();toast('Food item removed')}function deleteMeal(i){confirmDialog('Delete meal','Delete this meal and all food items?','Delete meal',()=>{state.dietMeals.splice(i,1);render();toast('Meal deleted')})}
function assignDiet(){modal('Assign diet chart',`<div class="field"><label>Client</label><select id="dietClient">${state.members.filter(m=>m.trainer==='Rahul Sharma').map(m=>`<option>${m.name}</option>`).join('')}</select></div>`,`<button class="btn" data-close>Cancel</button><button class="btn primary" id="dietAssignBtn">Assign chart</button>`);$('#dietAssignBtn').onclick=()=>{const n=$('#dietClient').value;closeModal();toast(`Diet chart assigned to ${n}`)}}function previewDiet(){modal('Member diet preview',state.dietMeals.map(m=>`<h3>${m.name}</h3>${m.items.map(i=>`<div class="attention-item"><span>${i.food} · ${i.qty}</span><strong>${i.cal} kcal</strong></div>`).join('')}`).join(''))}
function analysisPage(){const due=state.members.filter(m=>m.trainer==='Rahul Sharma').slice(0,3);return shell(`${pageHead('Weekly Analysis','Review adherence and publish member feedback')}<div class="grid two">${due.map((m,i)=>`<div class="card"><h3>${m.name}</h3><p>Sessions planned 4 · completed ${3+i%2}</p><p>Adherence ${78+i*6}% · Weight change -${(0.3+i*.2).toFixed(1)} kg</p><div class="field"><label>Coach notes</label><textarea id="analysis_${m.id}">Strong effort this week. Maintain consistency.</textarea></div><button class="btn" onclick="toast('Draft saved for ${m.name}')">Save draft</button> <button class="btn primary" onclick="publishAnalysis(${m.id})">Publish</button></div>`).join('')}</div>`)}
function publishAnalysis(id){const m=state.members.find(x=>x.id===id);m.analyses.unshift({week:'Week 29',adherence:86,note:$('#analysis_'+id).value});render();toast(`Weekly analysis published to ${m.name}`)}
function remindersPage(){return shell(`${pageHead('Reminders','Send now, schedule and track delivery')}<div class="grid two"><div class="card"><div class="field"><label>Recipients</label><select id="remRecipient"><option>One client</option><option>Several clients</option><option>All clients</option></select></div><div class="field"><label>Channel</label><select id="remChannel"><option>Email</option><option>WhatsApp</option><option>Email + WhatsApp</option></select></div><div class="field"><label>Template</label><select id="remTemplate" onchange="fillReminderTemplate(this.value)"><option value="session">Session reminder</option><option value="payment">Payment due</option><option value="progress">Weekly progress</option></select></div><div class="field"><label>Message</label><textarea id="remText">Hi, this is a reminder for your upcoming FlexCore session.</textarea></div><button class="btn primary" onclick="sendReminder(false)">Send now</button> <button class="btn" onclick="sendReminder(true)">Schedule later</button></div><div class="card"><h3>Sent history</h3>${state.reminders.map(r=>`<div class="attention-item"><span>${r.to}<br><small>${r.channel}</small></span><span class="badge active">${r.status}</span></div>`).join('')}</div></div>`)}
function fillReminderTemplate(v){$('#remText').value={session:'Hi, this is a reminder for your upcoming FlexCore session.',payment:'Your membership payment is due. Please complete it to avoid interruption.',progress:'Your weekly progress review is ready in the FlexCore member app.'}[v]}
function sendReminder(later){if(later){modal('Schedule reminder',`<div class="field"><label>Date and time</label><input id="remWhen" type="datetime-local" value="2026-07-23T09:00"></div>`,`<button class="btn" data-close>Cancel</button><button class="btn primary" id="scheduleRem">Schedule reminder</button>`);$('#scheduleRem').onclick=()=>{state.reminders.unshift({id:Date.now(),to:'Selected clients',channel:'Email + WhatsApp',message:'Scheduled',status:'Scheduled'});closeModal();render();toast('Reminder scheduled')}}else{state.reminders.unshift({id:Date.now(),to:$('#remRecipient').value,channel:$('#remChannel').value,message:$('#remText').value,status:'Delivered'});render();toast('Reminder sent')}}
function myHrPage(){const e=state.employees.find(x=>x.name==='Rahul Sharma'),t=attTotals(e.id),b=state.leaveBalances[e.name];return shell(`${pageHead('My HR','Your attendance, leave and payslips')}<div class="grid three"><div class="card"><h3>Attendance</h3><p>${t.p} present · ${t.a} absent · ${t.l} leave</p><button class="btn" onclick="toast('Attendance detail opened')">View details</button></div><div class="card"><h3>Leave balances</h3><p>Casual ${b.Casual} · Sick ${b.Sick} · Annual ${b.Annual}</p><button class="btn primary" onclick="applyLeave('Rahul Sharma')">Apply leave</button></div><div class="card"><h3>Payslips</h3><div class="attention-item"><span>June 2026</span><button class="btn sm" onclick="toast('June payslip downloaded')">Download</button></div></div></div>`)}
// Member phone
function memberApp(){const m=state.members[0];let body='';if(state.phoneTab==='home')body=phoneHome(m);if(state.phoneTab==='schedule')body=phoneSchedule(m);if(state.phoneTab==='plan')body=phonePlan(m);if(state.phoneTab==='progress')body=phoneProgress(m);if(state.phoneTab==='profile')body=phoneProfile(m);return `<div><header class="topbar"><strong>FlexCore Member Preview</strong><button class="btn" onclick="switchRole()">Switch role</button></header><div class="phone-stage"><div class="phone"><div class="phone-screen">${body}</div><nav class="phone-nav">${['home','schedule','plan','progress','profile'].map(t=>`<button class="phone-tab ${state.phoneTab===t?'active':''}" onclick="state.phoneTab='${t}';render()">${t[0].toUpperCase()+t.slice(1)}</button>`).join('')}</nav></div></div></div>`}
function phoneHome(m){const last=m.measurements.at(-1);return `<p class="subtle">Wednesday, 22 July</p><h1>Hi, ${m.name.split(' ')[0]}</h1><div class="session-card"><span class="badge active">Today</span><h3>Strength training</h3><p>6:00 PM with ${m.trainer}</p><button class="btn primary" onclick="toast('Attendance confirmed for today’s session')">Confirm attendance</button></div><div class="grid two"><div class="card"><small>Weight</small><h2>${last.weight} kg</h2></div><div class="card"><small>Calorie target</small><h2>2,000</h2></div></div><div class="card" style="margin-top:12px"><h3>Weight trend</h3><div class="chart" style="min-height:120px">${lineChart(m.measurements)}</div></div>`}
function phoneSchedule(m){const mine=state.sessions.filter(s=>s.client===m.name);return `<h1>Schedule</h1><div class="tabs"><button class="tab active" onclick="toast('Week view selected')">Week</button><button class="tab" onclick="toast('Month view selected')">Month</button></div>${mine.map(s=>`<div class="session-card"><strong>${s.date} · ${s.time}</strong><p>${s.trainer}</p><span class="badge ${s.status.toLowerCase()}">${s.status}</span></div>`).join('')||'<div class="empty"><h3>No sessions this week</h3><p>Your trainer’s future bookings will appear here.</p></div>'}<h3>Past sessions</h3><div class="attention-item"><span>18 Jul · Strength</span><span class="badge active">Completed</span></div>`}
function phonePlan(m){return `<h1>My Plan</h1><div class="tabs"><button class="tab ${state.phonePlan==='workout'?'active':''}" onclick="state.phonePlan='workout';render()">Workout</button><button class="tab ${state.phonePlan==='diet'?'active':''}" onclick="state.phonePlan='diet';render()">Diet</button></div>${state.phonePlan==='workout'?state.workoutPlan.map((d,di)=>`<h3>${d.day}</h3>${d.exercises.map((e,ei)=>{const k=di+'-'+ei;return `<label class="exercise"><input type="checkbox" ${state.workoutDone[k]?'checked':''} onchange="state.workoutDone['${k}']=this.checked;toast(this.checked?'${e.name} completed':'${e.name} unchecked')"><span>${e.name}<br><small>${e.sets} sets × ${e.reps}</small></span><b>${e.weight}</b></label>`}).join('')}`).join(''):`${state.dietMeals.map(me=>`<h3>${me.name}</h3>${me.items.map(i=>`<div class="attention-item"><span>${i.food}<br><small>${i.qty}</small></span><strong>${i.cal}</strong></div>`).join('')}`).join('')}<div class="card"><b>Daily total</b><h2>${dietTotals().cal} kcal</h2></div>`}`}
function phoneProgress(m){return `<h1>Progress</h1><div class="card"><h3>Weight</h3><div class="chart">${lineChart(m.measurements)}</div></div><div class="card" style="margin-top:12px"><h3>Body fat</h3><div class="chart">${lineChart(m.measurements,'fat','#d93d3d')}</div></div><h3>Measurements</h3><div class="table-wrap"><table style="min-width:420px"><thead><tr><th>Date</th><th>Weight</th><th>Fat</th><th>Waist</th></tr></thead><tbody>${m.measurements.map(x=>`<tr><td>${x.date}</td><td>${x.weight}</td><td>${x.fat}%</td><td>${x.waist}</td></tr>`).join('')}</tbody></table></div><h3>Weekly reviews</h3>${m.analyses.map(a=>`<div class="card" style="margin-top:9px"><b>${a.week} · ${a.adherence}%</b><p>${a.note}</p></div>`).join('')}`}
function phoneProfile(m){return `<h1>Profile</h1><div class="card"><p><b>${m.name}</b></p><p>${m.email}</p><p>${m.phone}</p></div><div class="card" style="margin-top:10px"><h3>Membership</h3><p><span class="badge active">${m.status}</span></p><p>Expires ${m.expiry}</p><p>Trainer ${m.trainer}</p></div><div class="card" style="margin-top:10px"><h3>Notifications</h3><label><input type="checkbox" checked onchange="toast('Session notifications '+(this.checked?'enabled':'disabled'))"> Session reminders</label><br><label><input type="checkbox" checked onchange="toast('Payment notifications '+(this.checked?'enabled':'disabled'))"> Payment reminders</label></div><div class="card" style="margin-top:10px"><h3>Payment history</h3>${state.payments.filter(p=>p.member===m.name).map(p=>`<div class="attention-item"><span>${p.date}</span><b>${INR(p.amount)}</b></div>`).join('')}</div>`}
function exportCSV(type){let text='FlexCore '+type+' export\nGenerated '+today;downloadText('FlexCore_'+type+'.csv',text);toast(`${type[0].toUpperCase()+type.slice(1)} exported`)}
function downloadText(name,text){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([text],{type:'text/plain'}));a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}
function render(){let html;if(!state.role)html=signin();else if(state.role==='member')html=memberApp();else{const map={dashboard,members:membersPage,memberProfile,trainers:trainersPage,trainerProfile,employees:employeesPage,employeeProfile,attendance:attendancePage,leave:leavePage,payroll:payrollPage,expenses:expensesPage,payments:paymentsPage,reports:reportsPage,awards:awardsPage,settings:settingsPage,today:trainerToday,clients:trainerClients,trainerClient,schedule:trainerSchedule,workout:workoutBuilder,diet:dietBuilder,analysis:analysisPage,reminders:remindersPage,myhr:myHrPage};html=(map[state.page]||map.dashboard)()}$('#app').innerHTML=html;window.scrollTo(0,0)}
render();
</script>
</body>

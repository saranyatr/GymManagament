function roleNav(){if(state.role==='admin')return [['Overview','dashboard','Dashboard'],['People','members','Members'],['People','trainers','Trainers'],['HR','employees','Employees'],['HR','attendance','Attendance'],['HR','leave','Leave'],['HR','payroll','Payroll'],['Finance','expenses','Expenses'],['Finance','payments','Payments'],['Insights','reports','Reports'],['Engagement','awards','Awards & Messages'],['System','settings','Settings']];if(state.role==='trainer')return [['Workspace','today','Today'],['Workspace','clients','My Clients'],['Workspace','schedule','Schedule'],['Planning','workout','Workout Builder'],['Planning','diet','Diet Builder'],['Coaching','analysis','Weekly Analysis'],['Coaching','reminders','Reminders'],['Account','myhr','My HR']];return []}
function shell(content){const nav=roleNav();let last='';return `<div class="shell"><aside class="sidebar" id="sidebar"><div class="brand">FlexCore<small>${state.role==='admin'?'OWNER SUITE':'TRAINER SUITE'}</small></div>${nav.map(n=>{let group='';if(n[0]!==last){last=n[0];group=`<div class="nav-group">${n[0]}</div>`}return group+`<button class="nav-btn ${state.page===n[1]?'active':''}" onclick="navigate('${n[1]}')">${n[2]}</button>`}).join('')}<div class="sidebar-bottom"><button class="nav-btn" onclick="switchRole()">⇄ Switch role</button></div></aside><main class="main"><header class="topbar"><div class="topbar-actions"><button class="btn mobile-menu" onclick="$('#sidebar').classList.toggle('open')">Menu</button><strong>${state.role==='admin'?'Amit Khanna — Owner':'Rahul Sharma — Trainer'}</strong></div><div class="topbar-actions"><span class="badge active">Prototype live</span><button class="btn sm" onclick="toast('Help hints are shown inline on interactive screens')">Help</button></div></header><section class="content">${content}</section></main></div>`}
function signin(){return `<div class="signin"><div class="signin-card"><section class="signin-hero"><div class="plate-mark"></div><h1>FlexCore</h1><p>Gym operations, coaching and member progress in one connected workspace.</p></section><section class="signin-panel"><h2>Choose a demo role</h2><p class="subtle">Each role opens a different application with its own permissions.</p><div class="role-grid"><button class="role-card" onclick="login('admin')"><span class="role-dot" style="background:var(--red)">A</span><span><strong>Admin / Gym Owner</strong><br><small>Finance, members, staff, HR and reports</small></span></button><button class="role-card" onclick="login('trainer')"><span class="role-dot" style="background:var(--blue)">T</span><span><strong>Trainer</strong><br><small>Clients, schedule, plans and reviews</small></span></button><button class="role-card" onclick="login('member')"><span class="role-dot" style="background:var(--green)">M</span><span><strong>Member</strong><br><small>Phone view of schedule, plan and progress</small></span></button></div><div class="prototype-note"><strong>Prototype note:</strong> These screens work, but nothing is saved. Refreshing the browser resets all demo data.</div></section></div></div>`}
function pageHead(title,sub,actions=''){return `<div class="page-head"><div><h1>${title}</h1><p>${sub}</p></div><div class="actions">${actions}</div></div>`}
function revenueForRange(){const count=state.filters.dateRange==='3m'?3:6;return state.revenueMonths.slice(-count).reduce((a,b)=>a+b,0)}
function expenseForRange(){const count=state.filters.dateRange==='3m'?3:6;const base=state.expenseMonths.slice(-count).reduce((a,b)=>a+b,0);const added=state.expenses.filter(e=>e.date>='2026-07-01').reduce((a,b)=>a+b.amount,0);return base+added}
function barChart(){const rev=state.revenueMonths,exp=state.expenseMonths,max=Math.max(...rev);return `<svg viewBox="0 0 620 260" aria-label="Revenue versus expenses chart">${monthKeys.map((m,i)=>{const x=48+i*92;const rh=rev[i]/max*190,eh=exp[i]/max*190;return `<g><rect x="${x}" y="${225-rh}" width="28" height="${rh}" rx="4" fill="#3276c3"><title>${m}: Revenue ${INR(rev[i])}</title></rect><rect x="${x+32}" y="${225-eh}" width="28" height="${eh}" rx="4" fill="#d93d3d"><title>${m}: Expenses ${INR(exp[i])}</title></rect><text x="${x+30}" y="244" text-anchor="middle">${m.slice(5)}</text></g>`}).join('')}<line x1="35" y1="225" x2="605" y2="225" stroke="#aab3bb"/></svg>`}
function donut(){const totals={};state.expenses.forEach(e=>totals[e.category]=(totals[e.category]||0)+e.amount);const entries=Object.entries(totals),total=entries.reduce((a,[,v])=>a+v,0),colors=['#d93d3d','#3276c3','#e2b72f','#3c9b66','#d97a2b','#7d5ba6'];let off=0;const segs=entries.map(([k,v],i)=>{const dash=v/total*251.2,html=`<circle class="donut-seg" onclick="state.filters.expenseCategory='${k}';navigate('expenses')" cx="70" cy="70" r="40" fill="none" stroke="${colors[i]}" stroke-width="24" stroke-dasharray="${dash} ${251.2-dash}" stroke-dashoffset="${-off}" transform="rotate(-90 70 70)"><title>${k}: ${INR(v)}</title></circle>`;off+=dash;return html}).join('');return `<div class="donut-wrap"><svg viewBox="0 0 140 140" width="220" height="220">${segs}<text x="70" y="66" text-anchor="middle" font-size="9">Expenses</text><text x="70" y="82" text-anchor="middle" font-size="12" font-weight="bold">${INR(total)}</text></svg><div>${entries.map(([k,v],i)=>`<button class="btn sm" style="display:flex;margin:7px 0;width:100%;justify-content:space-between" onclick="state.filters.expenseCategory='${k}';navigate('expenses')"><span><i class="swatch" style="display:inline-block;background:${colors[i]}"></i> ${k}</span><strong>${INR(v)}</strong></button>`).join('')}</div></div>`}
function dashboard(){const rev=revenueForRange(),exp=expenseForRange(),active=state.members.filter(m=>m.status==='Active').length;return shell(`${pageHead('Owner Dashboard','Live operations across both branches',`<select class="btn" onchange="state.filters.dateRange=this.value;render()"><option value="6m" ${state.filters.dateRange==='6m'?'selected':''}>Last 6 months</option><option value="3m" ${state.filters.dateRange==='3m'?'selected':''}>Last 3 months</option></select>`)}<div class="grid kpis"><div class="card metric clickable" style="--accent:var(--blue)" onclick="navigate('payments')"><span>Revenue</span><strong>${INR(rev)}</strong><span class="delta up">▲ 8.4% vs prior period</span></div><div class="card metric clickable" style="--accent:var(--red)" onclick="navigate('expenses')"><span>Expenses</span><strong>${INR(exp)}</strong><span class="delta down">▲ 5.1% cost increase</span></div><div class="card metric clickable" style="--accent:var(--yellow)" onclick="navigate('reports')"><span>Net profit</span><strong>${INR(rev-exp)}</strong><span class="delta up">▲ 12.2% margin improvement</span></div><div class="card metric clickable" style="--accent:var(--green)" onclick="navigate('members')"><span>Active members</span><strong>${active}</strong><span class="delta up">▲ 3 this month</span></div></div><div class="grid two" style="margin-top:16px"><div class="card"><h3>Revenue vs expenses</h3><div class="chart">${barChart()}</div><div class="legend"><span><i class="swatch" style="background:var(--blue)"></i>Revenue</span><span><i class="swatch" style="background:var(--red)"></i>Expenses</span></div></div><div class="card"><h3>Expense breakdown</h3>${donut()}</div><div class="card"><h3>Trainer performance</h3>${state.employees.filter(e=>e.department==='Training').sort((a,b)=>b.score-a.score).map((t,i)=>`<div class="leader clickable" onclick="state.selectedTrainer=${t.id};navigate('trainerProfile')"><span class="avatar">${i+1}</span><div><strong>${t.name}</strong><div class="subtle">${state.members.filter(m=>m.trainer===t.name).length} clients · ${t.attendance}% attendance</div></div><div><strong>${t.score}</strong>${i===0?'<div class="badge active">Top</div>':''}</div></div>`).join('')}</div><div class="card"><h3>Needs attention</h3><div class="attention-item clickable" onclick="navigate('payroll')"><span>Current payroll awaiting approval</span><span class="badge pending">Pending</span></div><div class="attention-item clickable" onclick="state.filters.memberStatus='Expiring';navigate('members')"><span>${state.members.filter(m=>m.expiry<'2026-09-01'&&m.status==='Active').length} memberships expiring soon</span><span>View</span></div><div class="attention-item clickable" onclick="navigate('payments')"><span>${state.payments.filter(p=>p.status==='Overdue').length} overdue member payments</span><span>View</span></div><div class="attention-item clickable" onclick="navigate('leave')"><span>${state.leaveRequests.filter(r=>r.status==='Pending').length} leave requests pending</span><span>Review</span></div></div></div>`)}
function memberFiltered(){let rows=state.members.filter(m=>{const q=state.filters.memberSearch.toLowerCase();const matches=!q||[m.name,m.goal,m.trainer].some(v=>v.toLowerCase().includes(q));let s=state.filters.memberStatus;const status=s==='All'||m.status===s||(s==='Expiring'&&m.status==='Active'&&m.expiry<'2026-09-01');return matches&&status});const key=state.sort.members;rows.sort((a,b)=>String(a[key]).localeCompare(String(b[key]),undefined,{numeric:true}));return rows}
function membersPage(){const rows=memberFiltered();return shell(`${pageHead('Members','Search, manage memberships and collect payments',`<button class="btn" onclick="exportCSV('members')">Export</button><button class="btn primary" onclick="memberForm()">Add member</button>`)}<div class="toolbar"><input class="btn" style="min-width:260px" placeholder="Search name, goal or trainer" value="${state.filters.memberSearch}" oninput="state.filters.memberSearch=this.value;render()"><select class="btn" onchange="state.filters.memberStatus=this.value;render()">${['All','Active','Paused','Expired','Expiring'].map(s=>`<option ${state.filters.memberStatus===s?'selected':''}>${s}</option>`).join('')}</select><button class="btn" onclick="bulkMemberAction('pause')">Pause selected</button><button class="btn" onclick="bulkMemberAction('renew')">Renew selected</button></div>${rows.length?`<div class="table-wrap"><table><thead><tr><th><input type="checkbox" onchange="$$('.member-check').forEach(x=>x.checked=this.checked)"></th>${[['name','Member'],['goal','Goal'],['trainer','Trainer'],['status','Status'],['expiry','Expiry'],['fee','Monthly fee']].map(([k,l])=>`<th class="sortable" onclick="state.sort.members='${k}';render()">${l} ↕</th>`).join('')}<th>Actions</th></tr></thead><tbody>${rows.map(m=>`<tr><td><input class="member-check" type="checkbox" value="${m.id}"></td><td><strong>${m.name}</strong><br><small>${m.email}</small></td><td>${m.goal}</td><td>${m.trainer}</td><td><span class="badge ${m.status.toLowerCase()}">${m.status}</span></td><td>${m.expiry}</td><td>${INR(m.fee)}</td><td><div class="actions"><button class="btn sm" onclick="state.selectedMember=${m.id};navigate('memberProfile')">View</button><button class="btn sm" onclick="memberForm(${m.id})">Edit</button><button class="btn sm" onclick="assignTrainer(${m.id})">Assign</button><button class="btn sm" onclick="renewMember(${m.id})">Renew</button><button class="btn sm" onclick="togglePause(${m.id})">${m.status==='Paused'?'Resume':'Pause'}</button><button class="btn sm danger" onclick="cancelMember(${m.id})">Cancel</button><button class="btn sm success" onclick="collectPayment(${m.id})">Pay</button></div></td></tr>`).join('')}</tbody></table></div>`:`<div class="card empty"><h3>No members match these filters</h3><p>Clear the search and status filter to see the full member directory.</p><button class="btn primary" onclick="state.filters.memberSearch='';state.filters.memberStatus='All';render()">Clear filters</button></div>`}`)}
function memberForm(id){const m=id?state.members.find(x=>x.id===id):{};modal(id?'Edit member':'Add member',`<form id="memberForm" class="form-grid" oninput="setDirty()"><div class="field"><label>Name *</label><input name="name" value="${m.name||''}" required><div class="error-text"></div></div><div class="field"><label>Email *</label><input name="email" type="email" value="${m.email||''}" required><div class="error-text"></div></div><div class="field"><label>Phone *</label><input name="phone" value="${m.phone||''}" required><div class="error-text"></div></div><div class="field"><label>Goal *</label><select name="goal">${goals.map(g=>`<option ${m.goal===g?'selected':''}>${g}</option>`).join('')}</select></div><div class="field"><label>Assigned trainer</label><select name="trainer">${trainers.map(t=>`<option ${m.trainer===t?'selected':''}>${t}</option>`).join('')}</select></div><div class="field"><label>Monthly fee *</label><input name="fee" type="number" min="1" value="${m.fee||2500}" required></div><div class="field"><label>Membership duration</label><select name="duration" onchange="calcExpiry(this)"><option value="1">1 month</option><option value="3">3 months</option><option value="6">6 months</option><option value="12">12 months</option></select></div><div class="field"><label>Expiry date</label><input name="expiry" value="${m.expiry||'2026-08-22'}" readonly></div><div class="field"><label>Emergency contact</label><input name="emergency" value="${m.emergency||''}"></div><div class="field"><label>Height (cm)</label><input name="height" type="number" value="${m.height||165}"></div><div class="field"><label>Weight (kg)</label><input name="weight" type="number" step=".1" value="${m.weight||70}"></div><div class="field full"><label>Existing conditions</label><textarea name="conditions">${m.conditions||''}</textarea></div></form>`,`<button class="btn" data-close>Cancel</button><button class="btn primary" id="saveMember">${id?'Save changes':'Add member'}</button>`);$('#saveMember').onclick=()=>saveMember(id)}
function calcExpiry(sel){const d=new Date(today);d.setMonth(d.getMonth()+Number(sel.value));sel.form.expiry.value=d.toISOString().slice(0,10)}
function saveMember(id){const f=$('#memberForm'),req=['name','email','phone','fee'];let invalid=null;req.forEach(n=>{const el=f[n],wrap=el.closest('.field'),err=wrap.querySelector('.error-text');wrap.classList.remove('error');err&&(err.textContent='');if(!el.value.trim()){wrap.classList.add('error');if(err)err.textContent='Required';invalid=invalid||el}});if(f.email.value&&!/^\S+@\S+\.\S+$/.test(f.email.value)){const w=f.email.closest('.field');w.classList.add('error');w.querySelector('.error-text').textContent='Enter a valid email';invalid=invalid||f.email}if(invalid){invalid.focus();toast('Please correct the highlighted fields','error');return}const data=Object.fromEntries(new FormData(f));if(id)Object.assign(state.members.find(x=>x.id===id),data,{fee:+data.fee,height:+data.height,weight:+data.weight});else state.members.push({...data,id:Date.now(),fee:+data.fee,height:+data.height,weight:+data.weight,status:'Active',start:today,branch:1,measurements:[],analyses:[]});state.dirty=false;closeModal();render();toast(`${data.name} ${id?'updated':'added'}`)}
function assignTrainer(id){const m=state.members.find(x=>x.id===id);modal('Assign trainer',`<div class="field"><label>Trainer for ${m.name}</label><select id="assignSelect">${trainers.map(t=>`<option ${m.trainer===t?'selected':''}>${t}</option>`).join('')}</select></div>`,`<button class="btn" data-close>Cancel</button><button class="btn primary" id="assignBtn">Assign trainer</button>`);$('#assignBtn').onclick=()=>{m.trainer=$('#assignSelect').value;closeModal();render();toast(`${m.name} assigned to ${m.trainer}`)}}
function renewMember(id){const m=state.members.find(x=>x.id===id);modal('Renew membership',`<div class="field"><label>Duration</label><select id="renewMonths"><option value="1">1 month</option><option value="3">3 months</option><option value="6">6 months</option><option value="12">12 months</option></select></div>`,`<button class="btn" data-close>Cancel</button><button class="btn success" id="renewBtn">Renew membership</button>`);$('#renewBtn').onclick=()=>{const d=new Date(m.expiry<today?today:m.expiry);d.setMonth(d.getMonth()+Number($('#renewMonths').value));m.expiry=d.toISOString().slice(0,10);m.status='Active';closeModal();render();toast(`${m.name}'s membership renewed`)}}
function togglePause(id){const m=state.members.find(x=>x.id===id);m.status=m.status==='Paused'?'Active':'Paused';render();toast(`${m.name} ${m.status==='Paused'?'paused':'resumed'}`)}
function cancelMember(id){const m=state.members.find(x=>x.id===id);confirmDialog('Cancel membership',`This ends ${m.name}'s active membership.`,'Cancel membership',()=>{m.status='Expired';render();toast(`${m.name}'s membership cancelled`)},m.name)}
function collectPayment(id){const m=state.members.find(x=>x.id===id);confirmDialog('Collect payment',`Record ${INR(m.fee)} from ${m.name}?`,'Collect payment',()=>{const receipt='FC-R'+Date.now().toString().slice(-6);state.payments.unshift({id:Date.now(),member:m.name,amount:m.fee,date:today,status:'Paid',method:'UPI',receipt});render();toast(`Payment collected. Receipt ${receipt}`)})}
function bulkMemberAction(type){const ids=$$('.member-check:checked').map(x=>+x.value);if(!ids.length){toast('Select at least one member','error');return}ids.forEach(id=>{const m=state.members.find(x=>x.id===id);if(type==='pause')m.status='Paused';else{m.status='Active';m.expiry='2026-10-22'}});render();toast(`${ids.length} memberships ${type==='pause'?'paused':'renewed'}`)}
function lineChart(points,key='weight',color='#3276c3'){if(!points.length)return '<div class="empty">No measurements yet</div>';const vals=points.map(p=>p[key]),min=Math.min(...vals)-1,max=Math.max(...vals)+1;return `<svg viewBox="0 0 600 230"><polyline fill="none" stroke="${color}" stroke-width="4" points="${points.map((p,i)=>`${35+i*(530/(points.length-1||1))},${200-(p[key]-min)/(max-min)*160}`).join(' ')}"/>${points.map((p,i)=>`<circle cx="${35+i*(530/(points.length-1||1))}" cy="${200-(p[key]-min)/(max-min)*160}" r="5" fill="${color}"><title>${p.date}: ${p[key]}</title></circle><text x="${35+i*(530/(points.length-1||1))}" y="220" text-anchor="middle">${p.date.slice(5)}</text>`).join('')}</svg>`}
function memberProfile(){const m=state.members.find(x=>x.id===state.selectedMember)||state.members[0],tabs=['overview','body','plans','schedule','analysis','documents'];let body='';if(state.memberTab==='overview')body=`<div class="grid two"><div class="card"><h3>Membership</h3><p><b>Status:</b> <span class="badge ${m.status.toLowerCase()}">${m.status}</span></p><p><b>Goal:</b> ${m.goal}</p><p><b>Trainer:</b> ${m.trainer}</p><p><b>Expiry:</b> ${m.expiry}</p></div><div class="card"><h3>Payment history</h3>${state.payments.filter(p=>p.member===m.name).map(p=>`<div class="attention-item"><span>${p.date} · ${p.method}</span><strong>${INR(p.amount)}</strong></div>`).join('')||'<div class="empty">No payments recorded.</div>'}</div></div>`;if(state.memberTab==='body')body=`<div class="card"><h3>Weight trend</h3><div class="chart">${lineChart(m.measurements)}</div></div><div class="card" style="margin-top:16px"><h3>Record new measurement</h3><div class="form-grid"><div class="field"><label>Weight</label><input id="newWeight" type="number" step=".1"></div><div class="field"><label>Body fat %</label><input id="newFat" type="number" step=".1"></div></div><button class="btn primary" style="margin-top:12px" onclick="recordMeasurement(${m.id})">Record measurement</button></div>`;if(state.memberTab==='plans')body=`<div class="grid two"><div class="card"><h3>Workout plan</h3>${state.workoutPlan.map(d=>`<h4>${d.day}</h4>${d.exercises.map(e=>`<p>${e.name} — ${e.sets} × ${e.reps}</p>`).join('')}`).join('')}</div><div class="card"><h3>Diet chart</h3>${state.dietMeals.map(me=>`<h4>${me.name}</h4>${me.items.map(i=>`<p>${i.food} · ${i.cal} kcal</p>`).join('')}`).join('')}</div></div>`;if(state.memberTab==='schedule')body=`<div class="card">${state.sessions.filter(s=>s.client===m.name).map(s=>`<div class="attention-item"><span>${s.date} ${s.time} with ${s.trainer}</span><span class="badge ${s.status.toLowerCase()}">${s.status}</span></div>`).join('')||'<div class="empty">No sessions currently scheduled.</div>'}</div>`;if(state.memberTab==='analysis')body=`<div class="grid two">${m.analyses.map(a=>`<div class="card"><h3>${a.week}</h3><p><b>${a.adherence}% adherence</b></p><p>${a.note}</p></div>`).join('')}</div>`;if(state.memberTab==='documents')body=`<div class="card"><div class="attention-item"><span>Health declaration.pdf</span><button class="btn sm" onclick="toast('Health declaration downloaded')">Download</button></div><div class="attention-item"><span>Membership agreement.pdf</span><button class="btn sm" onclick="toast('Membership agreement downloaded')">Download</button></div><button class="btn primary" onclick="toast('Document upload simulated')">Upload document</button></div>`;return shell(`${pageHead(m.name,`${m.goal} · ${m.trainer}`,`<button class="btn" onclick="navigate('members')">Back to members</button><button class="btn primary" onclick="memberForm(${m.id})">Edit profile</button>`)}<div class="tabs">${tabs.map(t=>`<button class="tab ${state.memberTab===t?'active':''}" onclick="state.memberTab='${t}';render()">${t[0].toUpperCase()+t.slice(1)}</button>`).join('')}</div>${body}`)}
function recordMeasurement(id){const m=state.members.find(x=>x.id===id),w=+$('#newWeight').value,f=+$('#newFat').value;if(!w||!f){toast('Enter weight and body fat','error');return}m.measurements.push({date:today,weight:w,fat:f,waist:m.measurements.at(-1)?.waist||80});render();toast(`Measurement recorded for ${m.name}`)}
function trainersPage(){const ts=state.employees.filter(e=>e.department==='Training');return shell(`${pageHead('Trainers','Capacity, attendance and coaching performance',`<button class="btn primary" onclick="trainerForm()">Add trainer</button>`)}<div class="grid three">${ts.map(t=>{const clients=state.members.filter(m=>m.trainer===t.name).length;return `<div class="card clickable" onclick="state.selectedTrainer=${t.id};navigate('trainerProfile')"><div class="avatar" style="background:var(--red)">${t.name.split(' ').map(x=>x[0]).join('')}</div><h3>${t.name}</h3><p>${clients}/${t.capacity} clients</p><div class="progressbar"><i style="width:${Math.min(100,clients/t.capacity*100)}%"></i></div><p>Performance <strong>${t.score}</strong> · Attendance ${t.attendance}%</p></div>`}).join('')}</div>`)}
function trainerForm(){modal('Add trainer',`<form id="trainerForm" class="form-grid"><div class="field"><label>Name</label><input name="name"></div><div class="field"><label>Email</label><input name="email" type="email"></div><div class="field"><label>Capacity</label><input name="capacity" type="number" value="10"></div><div class="field"><label>Monthly salary</label><input name="salary" type="number" value="45000"></div></form>`,`<button class="btn" data-close>Cancel</button><button class="btn primary" id="saveTrainer">Add trainer</button>`);$('#saveTrainer').onclick=()=>{const d=Object.fromEntries(new FormData($('#trainerForm')));if(!d.name||!d.email){toast('Name and email are required','error');return}state.employees.push({id:Date.now(),name:d.name,designation:'Trainer',department:'Training',status:'Active',type:'Full Time',basic:+d.salary*.6,hra:+d.salary*.24,conv:2000,medical:1500,special:+d.salary*.16-3500,capacity:+d.capacity,score:75,attendance:100});trainers.push(d.name);closeModal();render();toast(`${d.name} added`)}}

function employeesPage(){return shell(`${pageHead('Employees','All gym staff across departments',`<button class="btn" onclick="exportCSV('employees')">Export</button><button class="btn primary" onclick="employeeWizard()">Add employee</button>`)}<div class="toolbar"><select class="btn" id="deptFilter" onchange="filterEmployeeTable()"><option>All departments</option>${[...new Set(state.employees.map(e=>e.department))].map(x=>`<option>${x}</option>`).join('')}</select><select class="btn" id="desigFilter" onchange="filterEmployeeTable()"><option>All designations</option>${[...new Set(state.employees.map(e=>e.designation))].map(x=>`<option>${x}</option>`).join('')}</select><select class="btn" id="empStatusFilter" onchange="filterEmployeeTable()"><option>All statuses</option><option>Active</option><option>Inactive</option></select></div><div class="table-wrap"><table id="employeeTable"><thead><tr><th>Code</th><th>Name</th><th>Department</th><th>Designation</th><th>Type</th><th>Status</th><th>Action</th></tr></thead><tbody>${state.employees.map(e=>`<tr data-dept="${e.department}" data-designation="${e.designation}" data-status="${e.status}"><td>${e.code||'NEW'}</td><td>${e.name}</td><td>${e.department}</td><td>${e.designation}</td><td>${e.type}</td><td><span class="badge active">${e.status}</span></td><td><button class="btn sm" onclick="state.selectedEmployee=${e.id};navigate('employeeProfile')">View</button> <button class="btn sm" onclick="employeeWizard(${e.id})">Edit</button></td></tr>`).join('')}</tbody></table></div>`)}
function filterEmployeeTable(){const d=$('#deptFilter').value,g=$('#desigFilter').value,s=$('#empStatusFilter').value;$$('#employeeTable tbody tr').forEach(r=>r.classList.toggle('hidden',!((d==='All departments'||r.dataset.dept===d)&&(g==='All designations'||r.dataset.designation===g)&&(s==='All statuses'||r.dataset.status===s))));toast('Employee filters applied')}
let empStep=1,empEditId=null,empDraft={};function employeeWizard(id){empStep=1;empEditId=id;empDraft=id?{...state.employees.find(e=>e.id===id)}:{};renderEmployeeWizard()}
function renderEmployeeWizard(){const e=empDraft;const steps=['Personal','Employment','Salary','Statutory & Bank','Login'];let body='';if(empStep===1)body=`<div class="form-grid"><div class="field"><label>Name *</label><input id="ew_name" value="${e.name||''}"><div class="error-text"></div></div><div class="field"><label>Phone *</label><input id="ew_phone" value="${e.phone||''}"><div class="error-text"></div></div><div class="field"><label>Email *</label><input id="ew_email" value="${e.email||''}"><div class="error-text"></div></div><div class="field"><label>Date of birth</label><input id="ew_dob" type="date" value="${e.dob||''}"></div></div>`;if(empStep===2)body=`<div class="form-grid"><div class="field"><label>Employee code *</label><input id="ew_code" value="${e.code||''}"></div><div class="field"><label>Designation *</label><input id="ew_designation" value="${e.designation||''}"></div><div class="field"><label>Department *</label><input id="ew_department" value="${e.department||''}"></div><div class="field"><label>Employment type</label><select id="ew_type"><option>Full Time</option><option>Part Time</option><option>Contract</option></select></div><div class="field"><label>Joining date</label><input id="ew_joining" type="date" value="${e.joining||today}"></div><div class="field"><label>Reporting manager</label><select id="ew_manager">${state.employees.map(x=>`<option ${e.manager===x.name?'selected':''}>${x.name}</option>`).join('')}</select></div></div>`;if(empStep===3)body=`<div class="form-grid salary-inputs">${[['basic','Basic'],['hra','HRA'],['conv','Conveyance'],['medical','Medical'],['special','Special allowance']].map(([k,l])=>`<div class="field"><label>${l}</label><input id="ew_${k}" type="number" value="${e[k]||0}" oninput="salaryLive()"></div>`).join('')}<div class="card"><b>Gross</b><h3 id="grossLive">${INR((e.basic||0)+(e.hra||0)+(e.conv||0)+(e.medical||0)+(e.special||0))}</h3><span>CTC includes employer contributions</span><h3 id="ctcLive">${INR(((e.basic||0)+(e.hra||0)+(e.conv||0)+(e.medical||0)+(e.special||0))*1.13)}</h3></div></div>`;if(empStep===4)body=`<div class="form-grid"><div class="field"><label>PAN</label><input id="ew_pan" value="${e.pan||''}"></div><div class="field"><label>PF number</label><input id="ew_pf" value="${e.pf||''}"></div><div class="field"><label>ESI number</label><input id="ew_esi" value="${e.esi||''}"></div><div class="field"><label>Bank account</label><input id="ew_account" value="${e.account||''}"></div><div class="field"><label>IFSC</label><input id="ew_ifsc" value="${e.ifsc||''}"></div></div>`;if(empStep===5)body=`<div class="field"><label><input id="ew_login" type="checkbox" ${e.login?'checked':''}> Create employee login</label></div><div class="field"><label>Role</label><select id="ew_role"><option>Trainer</option><option>Manager</option><option>Staff</option></select></div>`;modal(empEditId?'Edit employee':'Add employee',`<div class="stepper">${steps.map((s,i)=>`<div class="step ${empStep===i+1?'active':''}">${i+1}. ${s}</div>`).join('')}</div><div id="wizardBody" oninput="setDirty()">${body}</div>`,`<button class="btn" ${empStep===1?'disabled':''} id="ewBack">Back</button><button class="btn primary" id="ewNext">${empStep===5?(empEditId?'Save employee':'Create employee'):'Next'}</button>`);$('#ewBack').onclick=()=>{captureEmp();empStep--;renderEmployeeWizard()};$('#ewNext').onclick=()=>{if(!captureEmp(true))return;if(empStep<5){empStep++;renderEmployeeWizard()}else saveEmployee()}}
function captureEmp(validate=false){const map={1:['name','phone','email','dob'],2:['code','designation','department','type','joining','manager'],3:['basic','hra','conv','medical','special'],4:['pan','pf','esi','account','ifsc'],5:['login','role']};for(const k of map[empStep]){const el=$('#ew_'+k);if(el)empDraft[k]=el.type==='checkbox'?el.checked:(el.type==='number'?+el.value:el.value)}if(validate&&empStep===1&&(!empDraft.name||!empDraft.phone||!empDraft.email)){toast('Name, phone and email are required','error');return false}if(validate&&empStep===2&&(!empDraft.code||!empDraft.designation||!empDraft.department)){toast('Code, designation and department are required','error');return false}return true}
function salaryLive(){const total=['basic','hra','conv','medical','special'].reduce((a,k)=>a+(+$('#ew_'+k).value||0),0);$('#grossLive').textContent=INR(total);$('#ctcLive').textContent=INR(total*1.13)}
function saveEmployee(){empDraft.status=empDraft.status||'Active';empDraft.id=empEditId||Date.now();empDraft.attendance=empDraft.attendance||100;if(empEditId)Object.assign(state.employees.find(e=>e.id===empEditId),empDraft);else{state.employees.push(empDraft);state.leaveBalances[empDraft.name]={Casual:6,Sick:8,Annual:12};state.attendance[empDraft.id]={};for(let d=1;d<=31;d++)state.attendance[empDraft.id][d]=new Date(2026,6,d).getDay()===0?'O':'P'}state.dirty=false;closeModal();render();toast(`${empDraft.name} ${empEditId?'updated':'added'}`)}
function employeeProfile(){const e=state.employees.find(x=>x.id===state.selectedEmployee)||state.employees[0];const tab=state.subpage||'personal';const tabs=['personal','employment','salary','attendance','leave','payslips','documents'];let body=`<div class="card"><h3>${tab[0].toUpperCase()+tab.slice(1)}</h3>`;if(tab==='personal')body+=`<p>Name: ${e.name}</p><p>Phone: ${e.phone||'9876543210'}</p><p>Email: ${e.email||e.name.toLowerCase().replaceAll(' ','.')+'@flexcore.in'}</p>`;if(tab==='employment')body+=`<p>${e.code} · ${e.designation}</p><p>${e.department} · ${e.type}</p><p>Joined ${e.joining}</p><p>Reports to ${e.manager}</p>`;if(tab==='salary')body+=`<p>Current gross: ${INR((e.basic||0)+(e.hra||0)+(e.conv||0)+(e.medical||0)+(e.special||0))}</p><div class="attention-item"><span>2026 revision</span><strong>8%</strong></div><button class="btn primary" onclick="toast('Salary revision added for ${e.name}')">Add revision</button>`;if(tab==='attendance')body+=`<p>Attendance rate: ${e.attendance}%</p><button class="btn" onclick="navigate('attendance')">Open attendance grid</button>`;if(tab==='leave')body+=Object.entries(state.leaveBalances[e.name]||{}).map(([k,v])=>`<p>${k}: ${v} days</p>`).join('');if(tab==='payslips')body+=`<div class="attention-item"><span>June 2026</span><button class="btn sm" onclick="toast('Payslip downloaded')">Download</button></div>`;if(tab==='documents')body+=`<button class="btn" onclick="toast('Document uploaded for ${e.name}')">Upload document</button>`;body+='</div>';return shell(`${pageHead(e.name,`${e.code||''} · ${e.designation}`,`<button class="btn" onclick="navigate('employees')">Back</button><button class="btn primary" onclick="employeeWizard(${e.id})">Edit employee</button>`)}<div class="tabs">${tabs.map(t=>`<button class="tab ${tab===t?'active':''}" onclick="state.subpage='${t}';render()">${t}</button>`).join('')}</div>${body}`)}
function attTotals(id){const vals=Object.values(state.attendance[id]||{});return {p:vals.filter(x=>x==='P').length,a:vals.filter(x=>x==='A').length,l:vals.filter(x=>x==='L').length,lop:vals.filter(x=>x==='A').length,ot:Math.max(0,vals.filter(x=>x==='P').length-24)*2}}
function attendancePage(){const days=31;return shell(`${pageHead('Attendance','Monthly staff attendance and payroll inputs',`<select class="btn" onchange="state.attendanceMonth=this.value;toast('Attendance month changed to '+this.value)"><option>2026-07</option><option>2026-06</option></select><button class="btn" onclick="markDayPresent()">Mark day present</button><button class="btn" onclick="exportCSV('attendance')">Export</button>`)}<div class="hint">Click any square to change the status. It cycles Present, Absent, Half day, Leave, Weekly off and Holiday.</div><div class="table-wrap"><table class="attendance"><thead><tr><th>Employee</th>${Array.from({length:days},(_,i)=>`<th>${i+1}</th>`).join('')}<th>P</th><th>A</th><th>L</th><th>LOP</th><th>OT</th></tr></thead><tbody>${state.employees.map(e=>{const t=attTotals(e.id);return `<tr><th>${e.name}</th>${Array.from({length:days},(_,i)=>{const s=state.attendance[e.id][i+1];return `<td><button class="att-cell att-${s}" title="${attName(s)}" onclick="cycleAttendance(${e.id},${i+1})">${s}</button></td>`}).join('')}<td>${t.p}</td><td>${t.a}</td><td>${t.l}</td><td>${t.lop}</td><td>${t.ot}</td></tr>`}).join('')}</tbody></table></div><div class="legend"><span><i class="swatch" style="background:#dff2e8"></i>P Present</span><span><i class="swatch" style="background:#fae0e0"></i>A Absent</span><span><i class="swatch" style="background:#fff1bd"></i>H Half day</span><span><i class="swatch" style="background:#dcecf9"></i>L Leave</span><span><i class="swatch" style="background:#e9ecef"></i>O Weekly off</span><span><i class="swatch" style="background:#eee2f7"></i>X Holiday</span></div>`)}
function attName(s){return {P:'Present',A:'Absent',H:'Half day',L:'Leave',O:'Weekly off',X:'Holiday'}[s]}
function cycleAttendance(id,d){const cycle=['P','A','H','L','O','X'],cur=state.attendance[id][d];state.attendance[id][d]=cycle[(cycle.indexOf(cur)+1)%cycle.length];render();toast(`${state.employees.find(e=>e.id===id).name}: ${attName(state.attendance[id][d])} on July ${d}`)}
function markDayPresent(){modal('Mark all present',`<div class="field"><label>Day of month</label><input id="markDay" type="number" min="1" max="31" value="22"></div>`,`<button class="btn" data-close>Cancel</button><button class="btn success" id="markPresentBtn">Mark all present</button>`);$('#markPresentBtn').onclick=()=>{const d=+$('#markDay').value;if(d<1||d>31){toast('Choose a valid day','error');return}state.employees.forEach(e=>state.attendance[e.id][d]='P');closeModal();render();toast(`All employees marked present on July ${d}`)}}
function leavePage(){const tab=state.subpage||'requests';return shell(`${pageHead('Leave Management','Balances, requests and holidays',`<button class="btn primary" onclick="applyLeave()">Apply for leave</button>`)}<div class="tabs">${['requests','balances','holidays'].map(t=>`<button class="tab ${tab===t?'active':''}" onclick="state.subpage='${t}';render()">${t}</button>`).join('')}</div>${tab==='requests'?leaveRequests():tab==='balances'?leaveBalances():holidays()}`)}
function leaveRequests(){return `<div class="card">${state.leaveRequests.map(r=>`<div class="attention-item"><div><strong>${r.employee}</strong><br><small>${r.type} · ${r.from} to ${r.to} · ${r.days} day(s)</small><p>${r.reason}</p></div><div>${r.status==='Pending'?`<button class="btn sm success" onclick="approveLeave(${r.id})">Approve</button> <button class="btn sm danger" onclick="rejectLeave(${r.id})">Reject</button>`:`<span class="badge ${r.status.toLowerCase()}">${r.status}</span>`}</div></div>`).join('')||'<div class="empty"><h3>No leave requests</h3><button class="btn primary" onclick="applyLeave()">Apply for leave</button></div>'}</div>`}
function leaveBalances(){return `<div class="table-wrap"><table><thead><tr><th>Employee</th><th>Casual</th><th>Sick</th><th>Annual</th><th>Action</th></tr></thead><tbody>${state.employees.map(e=>{const b=state.leaveBalances[e.name];return `<tr><td>${e.name}</td><td>${b.Casual}</td><td>${b.Sick}</td><td>${b.Annual}</td><td><button class="btn sm" onclick="adjustLeave('${e.name}')">Adjust</button></td></tr>`}).join('')}</tbody></table></div>`}
function holidays(){return `<div class="card"><button class="btn primary" onclick="holidayForm()">Add holiday</button>${state.holidays.map(h=>`<div class="attention-item"><span>${h.date} · ${h.name}</span><div><button class="btn sm" onclick="holidayForm(${h.id})">Edit</button> <button class="btn sm danger" onclick="deleteHoliday(${h.id})">Delete</button></div></div>`).join('')}</div>`}
function applyLeave(emp='Neha Verma'){modal('Apply for leave',`<form id="leaveForm" class="form-grid"><div class="field"><label>Employee</label><select name="employee">${state.employees.map(e=>`<option ${e.name===emp?'selected':''}>${e.name}</option>`).join('')}</select></div><div class="field"><label>Leave type</label><select name="type"><option>Casual</option><option>Sick</option><option>Annual</option></select></div><div class="field"><label>From</label><input name="from" type="date" value="2026-07-28" onchange="leaveDaysLive()"></div><div class="field"><label>To</label><input name="to" type="date" value="2026-07-29" onchange="leaveDaysLive()"></div><div class="field"><label>Days</label><input name="days" value="2" readonly></div><div class="field full"><label>Reason</label><textarea name="reason"></textarea><div class="error-text"></div></div></form>`,`<button class="btn" data-close>Cancel</button><button class="btn primary" id="submitLeave">Submit request</button>`);$('#submitLeave').onclick=submitLeave}
function leaveDaysLive(){const f=$('#leaveForm'),a=new Date(f.from.value),b=new Date(f.to.value);f.days.value=Math.max(0,Math.floor((b-a)/86400000)+1)}
function submitLeave(){const f=$('#leaveForm'),d=Object.fromEntries(new FormData(f)),days=+d.days,b=state.leaveBalances[d.employee][d.type];if(!d.reason.trim()){f.reason.closest('.field').classList.add('error');f.reason.closest('.field').querySelector('.error-text').textContent='Reason is required';f.reason.focus();return}if(days>b){toast(`Only ${b} ${d.type} leave days remain`,'error');return}state.leaveRequests.unshift({id:Date.now(),...d,days,status:'Pending'});closeModal();render();toast(`Leave request submitted for ${d.employee}`)}
function approveLeave(id){const r=state.leaveRequests.find(x=>x.id===id);confirmDialog('Approve leave',`Approve ${r.days} day(s) for ${r.employee}?`,'Approve leave',()=>{r.status='Approved';state.leaveBalances[r.employee][r.type]-=r.days;const e=state.employees.find(x=>x.name===r.employee);for(let d=new Date(r.from);d<=new Date(r.to);d.setDate(d.getDate()+1))state.attendance[e.id][d.getDate()]='L';render();toast(`Leave approved for ${r.employee}`)})}
function rejectLeave(id){const r=state.leaveRequests.find(x=>x.id===id);modal('Reject leave',`<div class="field"><label>Reason</label><textarea id="rejectReason"></textarea><div class="error-text"></div></div>`,`<button class="btn" data-close>Cancel</button><button class="btn danger" id="rejectBtn">Reject leave</button>`);$('#rejectBtn').onclick=()=>{const v=$('#rejectReason').value.trim();if(!v){$('#rejectReason').closest('.field').classList.add('error');$('#rejectReason').nextElementSibling.textContent='A rejection reason is required';return}r.status='Rejected';r.rejectReason=v;closeModal();render();toast(`Leave rejected for ${r.employee}`)}}
function adjustLeave(name){modal('Adjust leave balance',`<div class="field"><label>Leave type</label><select id="adjType"><option>Casual</option><option>Sick</option><option>Annual</option></select></div><div class="field"><label>Adjustment</label><input id="adjDays" type="number" value="1"></div>`,`<button class="btn" data-close>Cancel</button><button class="btn primary" id="adjBtn">Adjust balance</button>`);$('#adjBtn').onclick=()=>{state.leaveBalances[name][$('#adjType').value]+=+$('#adjDays').value;closeModal();render();toast(`${name}'s leave balance adjusted`)}}
function holidayForm(id){const h=id?state.holidays.find(x=>x.id===id):{};modal(id?'Edit holiday':'Add holiday',`<div class="field"><label>Date</label><input id="holDate" type="date" value="${h.date||''}"></div><div class="field"><label>Name</label><input id="holName" value="${h.name||''}"></div>`,`<button class="btn" data-close>Cancel</button><button class="btn primary" id="saveHoliday">Save holiday</button>`);$('#saveHoliday').onclick=()=>{if(!$('#holDate').value||!$('#holName').value){toast('Date and name are required','error');return}if(id)Object.assign(h,{date:$('#holDate').value,name:$('#holName').value});else state.holidays.push({id:Date.now(),date:$('#holDate').value,name:$('#holName').value});closeModal();render();toast(`Holiday ${id?'updated':'added'}`)}}
function deleteHoliday(id){const h=state.holidays.find(x=>x.id===id);confirmDialog('Delete holiday',`Delete ${h.name}?`,'Delete holiday',()=>{state.holidays=state.holidays.filter(x=>x.id!==id);render();toast(`${h.name} deleted`)},h.name)}
function payrollPage(){if(state.subpage==='history')return shell(`${pageHead('Payroll History','Approved and paid payroll runs',`<button class="btn" onclick="state.subpage=null;render()">Current run</button>`)}<div class="table-wrap"><table><thead><tr><th>Month</th><th>Status</th><th>Gross</th><th>Deductions</th><th>Net</th><th>Action</th></tr></thead><tbody>${state.payrollRuns.map(r=>`<tr><td>${r.month}</td><td><span class="badge paid">${r.status}</span></td><td>${INR(r.gross)}</td><td>${INR(r.deductions)}</td><td>${INR(r.net)}</td><td><button class="btn sm" onclick="toast('${r.month} payroll report downloaded')">Download</button></td></tr>`).join('')}</tbody></table></div>`);if(state.subpage==='advances')return salaryAdvancesPage();const run=state.currentPayroll;let content='';if(!run||state.payrollStep===1)content=`<div class="card"><h3>Step 1 · Generate</h3><div class="form-grid"><div class="field"><label>Payroll month</label><input id="payMonth" type="month" value="2026-07"></div></div><p class="subtle">Payslips will be pro-rated using the live attendance grid.</p><button class="btn primary" onclick="generatePayroll(this)">Generate payroll</button></div>`;else if(state.payrollStep===2)content=payrollReview(run);else if(state.payrollStep===3)content=payrollApprove(run);else content=payrollPay(run);return shell(`${pageHead('Payroll Run','Generate, review, approve and pay staff',`<button class="btn" onclick="state.subpage='history';render()">History</button><button class="btn" onclick="state.subpage='advances';render()">Salary advances</button>`)}<div class="stepper">${['Generate','Review','Approve','Pay'].map((s,i)=>`<div class="step ${state.payrollStep===i+1?'active':''}">${i+1}. ${s}</div>`).join('')}</div>${content}`)}
function generatePayroll(btn){loading(btn,'Generating...',()=>{const slips=state.employees.map(e=>{const t=attTotals(e.id),working=27,paid=Math.max(0,working-t.lop-.5*Object.values(state.attendance[e.id]).filter(x=>x==='H').length),gross=(e.basic||0)+(e.hra||0)+(e.conv||0)+(e.medical||0)+(e.special||0),lop=gross/working*(working-paid),ot=t.ot*((e.basic||0)/working/8)*state.settings.overtime,pf=(e.basic||0)*state.settings.pf/100,esi=gross*state.settings.esi/100;return {employee:e.name,working,paid:+paid.toFixed(1),basic:e.basic||0,hra:e.hra||0,allow:(e.conv||0)+(e.medical||0)+(e.special||0),ot:+ot.toFixed(0),bonus:0,pf:+pf.toFixed(0),esi:+esi.toFixed(0),pt:200,tds:0,advance:state.salaryAdvances.find(a=>a.employee===e.name)?.installment||0,lop:+lop.toFixed(0),other:0,paidStatus:false}});state.currentPayroll={month:$('#payMonth').value,status:'Draft',locked:false,slips};state.payrollStep=2;render();toast('Payroll generated for '+state.currentPayroll.month)})}
function slipTotals(s){const gross=s.basic+s.hra+s.allow+s.ot+s.bonus,ded=s.pf+s.esi+s.pt+s.tds+s.advance+s.lop+s.other;return {gross,ded,net:gross-ded}}
function payrollReview(run){const totals=run.slips.reduce((a,s)=>{const t=slipTotals(s);a.gross+=t.gross;a.ded+=t.ded;a.net+=t.net;return a},{gross:0,ded:0,net:0});return `<div class="hint">Bonus, TDS and other deductions are editable. Net pay recalculates immediately.</div><div class="card"><div class="grid kpis"><div><b>Gross</b><h3>${INR(totals.gross)}</h3></div><div><b>Deductions</b><h3>${INR(totals.ded)}</h3></div><div><b>Net payout</b><h3>${INR(totals.net)}</h3></div><div><b>Headcount</b><h3>${run.slips.length}</h3></div></div></div><div class="table-wrap" style="margin-top:14px"><table><thead><tr><th>Employee</th><th>Paid days</th><th>Gross</th><th>PF</th><th>ESI</th><th>LOP</th><th>Bonus</th><th>TDS</th><th>Other</th><th>Net</th></tr></thead><tbody>${run.slips.map((s,i)=>{const t=slipTotals(s);return `<tr><td>${s.employee}</td><td>${s.paid}/${s.working}</td><td>${INR(t.gross)}</td><td>${INR(s.pf)}</td><td>${INR(s.esi)}</td><td>${INR(s.lop)}</td><td><input style="width:90px" type="number" value="${s.bonus}" onchange="editSlip(${i},'bonus',this.value)"></td><td><input style="width:90px" type="number" value="${s.tds}" onchange="editSlip(${i},'tds',this.value)"></td><td><input style="width:90px" type="number" value="${s.other}" onchange="editSlip(${i},'other',this.value)"></td><td><strong>${INR(t.net)}</strong></td></tr>`}).join('')}</tbody></table></div><div class="actions" style="margin-top:14px"><button class="btn" onclick="state.payrollStep=1;render()">Back</button><button class="btn primary" onclick="submitPayrollReview()">Submit for approval</button></div>`}
function editSlip(i,k,v){if(state.currentPayroll.locked){toast('Payroll is locked after approval','error');render();return}state.currentPayroll.slips[i][k]=+v;render()}
function submitPayrollReview(){state.currentPayroll.status='Awaiting Approval';state.payrollStep=3;render();toast('Payroll submitted for approval')}
function payrollApprove(run){const net=run.slips.reduce((a,s)=>a+slipTotals(s).net,0);return `<div class="card"><h3>Step 3 · Approve</h3><p>Review complete for ${run.slips.length} employees.</p><h2>Total payout: ${INR(net)}</h2><p>Approval locks the run and prevents further editing.</p><button class="btn" onclick="state.payrollStep=2;render()">Back to review</button> <button class="btn primary" onclick="approvePayroll()">Approve payroll</button></div>`}
function approvePayroll(){const net=state.currentPayroll.slips.reduce((a,s)=>a+slipTotals(s).net,0);confirmDialog('Approve payroll',`Approve and lock a total payout of ${INR(net)}?`,'Approve payroll',()=>{state.currentPayroll.status='Approved';state.currentPayroll.locked=true;state.payrollStep=4;render();toast('Payroll approved')})}
function payrollPay(run){return `<div class="card"><div class="actions"><button class="btn success" onclick="markAllPaid()">Mark all paid</button><button class="btn" onclick="exportBankFile()">Export bank file</button></div></div><div class="table-wrap" style="margin-top:14px"><table><thead><tr><th>Employee</th><th>Net pay</th><th>Status</th><th>Actions</th></tr></thead><tbody>${run.slips.map((s,i)=>`<tr><td>${s.employee}</td><td>${INR(slipTotals(s).net)}</td><td><span class="badge ${s.paidStatus?'paid':'pending'}">${s.paidStatus?'Paid':'Approved'}</span></td><td><button class="btn sm success" ${s.paidStatus?'disabled':''} onclick="markSlipPaid(${i})">Mark paid</button> <button class="btn sm" onclick="toast('${s.employee} payslip downloaded')">Download</button> <button class="btn sm" onclick="toast('Payslip emailed to ${s.employee}')">Email</button></td></tr>`).join('')}</tbody></table></div>`}
function markSlipPaid(i){const s=state.currentPayroll.slips[i];confirmDialog('Mark salary paid',`Mark ${INR(slipTotals(s).net)} paid to ${s.employee}?`,'Mark paid',()=>{s.paidStatus=true;addSalaryExpense(slipTotals(s).net,s.employee);render();toast(`${s.employee} marked paid`)})}
function markAllPaid(){const unpaid=state.currentPayroll.slips.filter(s=>!s.paidStatus),total=unpaid.reduce((a,s)=>a+slipTotals(s).net,0);confirmDialog('Mark all salaries paid',`Record payment of ${INR(total)} for ${unpaid.length} employees?`,'Mark all paid',()=>{unpaid.forEach(s=>{s.paidStatus=true;addSalaryExpense(slipTotals(s).net,s.employee)});state.currentPayroll.status='Paid';state.payrollRuns.unshift({month:state.currentPayroll.month,status:'Paid',gross:state.currentPayroll.slips.reduce((a,s)=>a+slipTotals(s).gross,0),deductions:state.currentPayroll.slips.reduce((a,s)=>a+slipTotals(s).ded,0),net:state.currentPayroll.slips.reduce((a,s)=>a+slipTotals(s).net,0)});render();toast('All salaries marked paid')})}
function addSalaryExpense(amount,employee){state.expenses.unshift({id:Date.now()+Math.random(),category:'Salary',description:'Salary payment - '+employee,amount,date:today,vendor:employee})}
function exportBankFile(){downloadText('FlexCore_Bank_Transfer.csv','Employee,Amount\n'+state.currentPayroll.slips.map(s=>`${s.employee},${slipTotals(s).net}`).join('\n'));toast('Bank transfer file exported')}
function salaryAdvancesPage(){return shell(`${pageHead('Salary Advances','Issue and recover employee advances',`<button class="btn" onclick="state.subpage=null;render()">Current payroll</button><button class="btn primary" onclick="issueAdvance()">Issue advance</button>`)}<div class="table-wrap"><table><thead><tr><th>Employee</th><th>Original</th><th>Remaining</th><th>Monthly recovery</th></tr></thead><tbody>${state.salaryAdvances.map(a=>`<tr><td>${a.employee}</td><td>${INR(a.amount)}</td><td>${INR(a.remaining)}</td><td>${INR(a.installment)}</td></tr>`).join('')}</tbody></table></div>`)}
function issueAdvance(){modal('Issue salary advance',`<div class="field"><label>Employee</label><select id="advEmp">${state.employees.map(e=>`<option>${e.name}</option>`).join('')}</select></div><div class="field"><label>Amount</label><input id="advAmount" type="number"></div><div class="field"><label>Monthly recovery</label><input id="advInstall" type="number"></div>`,`<button class="btn" data-close>Cancel</button><button class="btn success" id="advBtn">Issue advance</button>`);$('#advBtn').onclick=()=>{const amount=+$('#advAmount').value,installment=+$('#advInstall').value;if(!amount||!installment){toast('Enter amount and recovery','error');return}state.salaryAdvances.push({id:Date.now(),employee:$('#advEmp').value,amount,remaining:amount,installment});closeModal();render();toast('Salary advance issued')}}
function expensesPage(){let rows=state.expenses.filter(e=>state.filters.expenseCategory==='All'||e.category===state.filters.expenseCategory);const sums={};state.expenses.forEach(e=>sums[e.category]=(sums[e.category]||0)+e.amount);return shell(`${pageHead('Expenses','Record costs and see profit update immediately',`<button class="btn" onclick="exportCSV('expenses')">Export</button><button class="btn primary" onclick="expenseForm()">Record expense</button>`)}<div class="grid three">${Object.entries(sums).slice(0,6).map(([k,v])=>`<div class="card clickable" onclick="state.filters.expenseCategory='${k}';render()"><b>${k}</b><h3>${INR(v)}</h3></div>`).join('')}</div><div class="toolbar" style="margin-top:16px"><select class="btn" onchange="state.filters.expenseCategory=this.value;render()"><option>All</option>${[...new Set(state.expenses.map(e=>e.category))].map(c=>`<option ${state.filters.expenseCategory===c?'selected':''}>${c}</option>`).join('')}</select><button class="btn" onclick="state.expenses.sort((a,b)=>a.amount-b.amount);render()">Sort amount</button><button class="btn" onclick="state.filters.expenseCategory='All';render()">Clear</button></div>${rows.length?`<div class="table-wrap"><table><thead><tr><th>Date</th><th>Category</th><th>Description</th><th>Vendor</th><th>Amount</th><th>Actions</th></tr></thead><tbody>${rows.map(e=>`<tr><td>${e.date}</td><td>${e.category}</td><td>${e.description}</td><td>${e.vendor}</td><td>${INR(e.amount)}</td><td><button class="btn sm" onclick="expenseForm(${e.id})">Edit</button> <button class="btn sm danger" onclick="deleteExpense(${e.id})">Delete</button></td></tr>`).join('')}</tbody></table></div>`:`<div class="card empty"><h3>No expenses in this category</h3><button class="btn primary" onclick="state.filters.expenseCategory='All';render()">Show all expenses</button></div>`}`)}
function expenseForm(id){const e=id?state.expenses.find(x=>x.id===id):{};modal(id?'Edit expense':'Record expense',`<form id="expenseForm" class="form-grid"><div class="field"><label>Category</label><select name="category">${['Rent','Utilities','Equipment','Marketing','Maintenance','Salary','Other'].map(c=>`<option ${e.category===c?'selected':''}>${c}</option>`).join('')}</select></div><div class="field"><label>Amount *</label><input name="amount" type="number" value="${e.amount||''}"></div><div class="field"><label>Date</label><input name="date" type="date" value="${e.date||today}"></div><div class="field"><label>Vendor</label><input name="vendor" value="${e.vendor||''}"></div><div class="field full"><label>Description *</label><textarea name="description">${e.description||''}</textarea></div></form>`,`<button class="btn" data-close>Cancel</button><button class="btn primary" id="saveExpense">${id?'Save expense':'Record expense'}</button>`);$('#saveExpense').onclick=()=>{const d=Object.fromEntries(new FormData($('#expenseForm')));if(!d.amount||!d.description){toast('Amount and description are required','error');return}d.amount=+d.amount;if(id)Object.assign(e,d);else state.expenses.unshift({id:Date.now(),...d});closeModal();render();toast(`Expense ${id?'updated':'recorded'}. Dashboard profit recalculated`)}}
function deleteExpense(id){const e=state.expenses.find(x=>x.id===id);confirmDialog('Delete expense',`Delete ${e.description} for ${INR(e.amount)}?`,'Delete expense',()=>{state.expenses=state.expenses.filter(x=>x.id!==id);render();toast('Expense deleted')},e.description)}
function paymentsPage(){const overdue=state.payments.filter(p=>p.status==='Overdue');return shell(`${pageHead('Member Payments','Receipts, refunds and overdue follow-up',`<button class="btn primary" onclick="recordPayment()">Record payment</button>`)}<div class="card"><h3>Overdue payments</h3><div class="actions"><button class="btn warn" onclick="sendAllReminders()">Send all reminders</button></div>${overdue.map(p=>`<div class="attention-item"><span>${p.member} · ${INR(p.amount)}</span><button class="btn sm" onclick="toast('Payment reminder sent to ${p.member}')">Send reminder</button></div>`).join('')||'<div class="empty">No overdue payments.</div>'}</div><div class="table-wrap" style="margin-top:16px"><table><thead><tr><th>Date</th><th>Member</th><th>Amount</th><th>Method</th><th>Receipt</th><th>Status</th><th>Actions</th></tr></thead><tbody>${state.payments.map(p=>`<tr><td>${p.date}</td><td>${p.member}</td><td>${INR(p.amount)}</td><td>${p.method}</td><td>${p.receipt}</td><td><span class="badge ${p.status.toLowerCase()}">${p.status}</span></td><td><button class="btn sm" ${p.receipt==='—'?'disabled':''} onclick="toast('Receipt ${p.receipt} downloaded')">Receipt</button> <button class="btn sm danger" ${p.status!=='Paid'?'disabled':''} onclick="refundPayment(${p.id})">Refund</button></td></tr>`).join('')}</tbody></table></div>`)}
function recordPayment(){modal('Record payment',`<div class="field"><label>Member</label><select id="payMember">${state.members.map(m=>`<option>${m.name}</option>`).join('')}</select></div><div class="field"><label>Amount</label><input id="payAmount" type="number" value="2500"></div><div class="field"><label>Method</label><select id="payMethod"><option>UPI</option><option>Card</option><option>Cash</option></select></div>`,`<button class="btn" data-close>Cancel</button><button class="btn success" id="recPayBtn">Record payment</button>`);$('#recPayBtn').onclick=()=>{const receipt='FC-R'+Date.now().toString().slice(-6);state.payments.unshift({id:Date.now(),member:$('#payMember').value,amount:+$('#payAmount').value,date:today,status:'Paid',method:$('#payMethod').value,receipt});closeModal();render();toast(`Payment recorded. Receipt ${receipt}`)}}
function refundPayment(id){const p=state.payments.find(x=>x.id===id);confirmDialog('Refund payment',`Refund ${INR(p.amount)} to ${p.member}?`,'Refund payment',()=>{p.status='Refunded';render();toast(`Payment refunded to ${p.member}`)})}
function sendAllReminders(){const count=state.payments.filter(p=>p.status==='Overdue').length;toast(`${count} payment reminders sent`)}
function reportsPage(){const rows=monthKeys.map((m,i)=>({m,rev:state.revenueMonths[i],exp:state.expenseMonths[i],growth:2+i,churn:Math.max(1,5-i*.4),util:68+i*4,payroll:210000+i*8000}));return shell(`${pageHead('Reports','Financial, membership and workforce trends',`<select class="btn" onchange="toast('Report range updated to '+this.value)"><option>Last 6 months</option><option>Current quarter</option></select><button class="btn" onclick="exportCSV('reports')">Export</button><button class="btn" onclick="window.print();toast('Print dialog opened')">Print</button>`)}<div class="table-wrap"><table><thead><tr><th>Month</th><th>Revenue</th><th>Expenses</th><th>Profit</th><th>Margin</th><th>Member growth</th><th>Churn</th><th>Trainer utilisation</th><th>Payroll cost</th></tr></thead><tbody>${rows.map(r=>`<tr><td>${r.m}</td><td>${INR(r.rev)}</td><td>${INR(r.exp)}</td><td>${INR(r.rev-r.exp)}</td><td>${Math.round((r.rev-r.exp)/r.rev*100)}%</td><td>+${r.growth}%</td><td>${r.churn.toFixed(1)}%</td><td>${r.util}%</td><td>${INR(r.payroll)}</td></tr>`).join('')}</tbody></table></div><div class="grid two" style="margin-top:16px"><div class="card"><h3>Member growth and churn</h3><div class="chart">${lineChart(rows.map(r=>({date:r.m,score:r.growth})),'score','#3c9b66')}</div></div><div class="card"><h3>Payroll cost trend</h3><div class="chart">${lineChart(rows.map(r=>({date:r.m,score:r.payroll})),'score','#e2b72f')}</div></div></div>`)}
function awardsPage(){const top=state.employees.filter(e=>e.department==='Training').sort((a,b)=>b.score-a.score)[0];return shell(`${pageHead('Awards & Messages','Recognise performance and manage automation') }<div class="grid two"><div class="card"><h3>Best performer — July</h3><div class="avatar" style="width:64px;height:64px;background:var(--yellow);color:#222">#1</div><h2 id="awardName">${top.name}</h2><p>Score ${top.score} · ${top.attendance}% attendance</p><button class="btn" onclick="overrideAward()">Manual override</button> <button class="btn primary" onclick="previewAwardEmail()">Preview email</button></div><div class="card"><h3>Automated messages</h3>${Object.entries(state.messages).map(([k,v])=>`<div class="attention-item"><span>${k[0].toUpperCase()+k.slice(1)} messages</span><label><input type="checkbox" ${v?'checked':''} onchange="state.messages.${k}=this.checked;toast('${k} automation '+(this.checked?'enabled':'disabled'))"> ${v?'On':'Off'}</label></div>`).join('')}</div></div>`)}
function overrideAward(){modal('Manual override',`<div class="field"><label>Select trainer</label><select id="awardTrainer">${state.employees.filter(e=>e.department==='Training').map(e=>`<option>${e.name}</option>`).join('')}</select></div>`,`<button class="btn" data-close>Cancel</button><button class="btn primary" id="awardBtn">Set performer</button>`);$('#awardBtn').onclick=()=>{$('#awardName').textContent=$('#awardTrainer').value;closeModal();toast('Best performer manually overridden')}}
function previewAwardEmail(){modal('Best performer email preview',`<p><b>Subject:</b> Congratulations — FlexCore Best Performer</p><p>We are proud to recognise this month's outstanding coaching performance. Thank you for delivering consistent member results.</p>`,`<button class="btn" data-close>Close</button><button class="btn primary" id="sendAward">Send email</button>`);$('#sendAward').onclick=()=>{closeModal();toast('Best performer email sent')}}
function settingsPage(){return shell(`${pageHead('Settings','Prototype values persist until refresh',`<button class="btn primary" onclick="saveSettings()">Save settings</button>`)}<div class="grid two"><div class="card"><h3>Branches</h3>${state.branches.map(b=>`<div class="attention-item"><span>${b.name}<br><small>${b.city}</small></span><button class="btn sm" onclick="editBranch(${b.id})">Edit</button></div>`).join('')}<button class="btn" onclick="editBranch()">Add branch</button></div><div class="card"><h3>Users & roles</h3><div class="attention-item"><span>Admin users</span><strong>2</strong></div><div class="attention-item"><span>Trainer users</span><strong>4</strong></div><button class="btn" onclick="toast('Role permissions saved in memory')">Manage permissions</button></div><div class="card"><h3>Notification preferences</h3><label><input type="checkbox" ${state.settings.notifications?'checked':''} onchange="state.settings.notifications=this.checked;setDirty()"> Enable notifications</label><div class="field"><label>Default membership price</label><input type="number" value="${state.settings.pricing}" onchange="state.settings.pricing=+this.value;setDirty()"></div><div class="field"><label>Annual leave allowance</label><input type="number" value="${state.settings.leaveAnnual}" onchange="state.settings.leaveAnnual=+this.value;setDirty()"></div></div><div class="card"><h3>Payroll settings</h3><div class="field"><label>PF contribution %</label><input type="number" value="${state.settings.pf}" onchange="state.settings.pf=+this.value;setDirty()"></div><div class="field"><label>ESI contribution %</label><input type="number" step=".01" value="${state.settings.esi}" onchange="state.settings.esi=+this.value;setDirty()"></div><div class="field"><label>Overtime multiplier</label><input type="number" step=".1" value="${state.settings.overtime}" onchange="state.settings.overtime=+this.value;setDirty()"></div><button class="btn" onclick="toast('Tax slab editor opened')">Edit tax slab</button></div></div>`)}
function saveSettings(){state.dirty=false;toast('Settings saved in memory')}
function editBranch(id){const b=id?state.branches.find(x=>x.id===id):{};modal(id?'Edit branch':'Add branch',`<div class="field"><label>Branch name</label><input id="brName" value="${b.name||''}"></div><div class="field"><label>City</label><input id="brCity" value="${b.city||''}"></div>`,`<button class="btn" data-close>Cancel</button><button class="btn primary" id="brSave">Save branch</button>`);$('#brSave').onclick=()=>{if(!$('#brName').value||!$('#brCity').value){toast('Branch name and city required','error');return}if(id)Object.assign(b,{name:$('#brName').value,city:$('#brCity').value});else state.branches.push({id:Date.now(),name:$('#brName').value,city:$('#brCity').value});closeModal();render();toast(`Branch ${id?'updated':'added'}`)}}
